name = "school-directory-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "c3b373ae8a90a6494e520f962bdf462b"

# Single-tenant config. SCHOOL_NAME is surfaced in UI copy via /me + i18n.
[vars]
SCHOOL_NAME = "Eisenhower"
# Where the SPA lives; magic links and CORS use this origin.
APP_URL = "http://localhost:5173"
# Comma-separated origins allowed to call the API with credentials.
ALLOWED_ORIGINS = "http://localhost:5173"
# Geocoding endpoint (OpenStreetMap Nominatim). Override to a self-hosted/paid
# instance if address volume ever outgrows the public endpoint's 1 rps policy.
NOMINATIM_URL = "https://nominatim.openstreetmap.org/search"
# Comma-separated emails granted system_admin on sign-in. Set this BEFORE the
# first deploy — these accounts can sign in even when registration is closed, so
# they bootstrap a bare instance (then open registration / bulk-import / invite).
# e.g. "office@school.edu,principal@school.edu"
BOOTSTRAP_ADMIN_EMAILS = ""
# Optional static-map provider template ({lat}{lon}{w}{h}{zoom}) for the address
# map thumbnail. Unset → a single OSM tile (no key). Set a keyed provider (e.g.
# Geoapify/Stadia/Mapbox) for centered/marker maps. Rendered server-side; coords
# never reach the client.
# STATIC_MAP_URL = ""

# D1 (SQLite). For LOCAL dev `wrangler dev` uses a local sqlite file under .wrangler/
# and applies migrations from migrations_dir. Replace database_id after running
# `wrangler d1 create school-directory` to go remote (see README).
[[d1_databases]]
binding = "DB"
database_name = "school-directory"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

# R2 for profile photos (served via signed Worker route).
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "school-directory-photos"

# Shared-calendar refresh: re-fetch all ICS feeds every 3 hours (see the
# `scheduled` handler in src/index.ts). Mirrored under env.production below.
[triggers]
crons = ["0 */3 * * *"]

# Secrets (set via `wrangler secret put --env production`, or .dev.vars locally):
#   RESEND_API_KEY   — Resend email API key (magic links / invites)
#   EMAIL_FROM       — verified Resend sender, e.g. "Eisenhower Directory <directory@…>"
#   SESSION_SECRET   — random string reserved for HMAC needs

# ── Production environment (deploy with `wrangler deploy --env production`) ──────
# SPA: https://directory.meandmybadself.com (Pages)
# API: https://api-directory.meandmybadself.com (this Worker, custom domain below)
[env.production.vars]
SCHOOL_NAME = "Eisenhower"
APP_URL = "https://directory.meandmybadself.com"
ALLOWED_ORIGINS = "https://directory.meandmybadself.com"
NOMINATIM_URL = "https://nominatim.openstreetmap.org/search"
BOOTSTRAP_ADMIN_EMAILS = "meandmybadself@gmail.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "school-directory"
database_id = "ccd3f017-fce7-4ca4-a91d-7a903d2d82a6"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "PHOTOS"
bucket_name = "school-directory-photos"

[env.production.triggers]
crons = ["0 */3 * * *"]

# Custom domain — wrangler provisions the DNS record + cert on deploy (zone is
# on this account).
[[env.production.routes]]
pattern = "api-directory.meandmybadself.com"
custom_domain = true
