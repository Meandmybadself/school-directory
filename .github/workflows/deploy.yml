name: Deploy

# Deploy on merge to main. No-ops cleanly until the Cloudflare secrets are set:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if Cloudflare secrets are absent
        id: guard
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Cloudflare secrets not configured — skipping deploy."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.guard.outputs.enabled == 'true'
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.enabled == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.guard.outputs.enabled == 'true'

      - name: Apply D1 migrations
        if: steps.guard.outputs.enabled == 'true'
        working-directory: apps/api
        run: pnpm exec wrangler d1 migrations apply school-directory --remote

      - name: Deploy API (Worker)
        if: steps.guard.outputs.enabled == 'true'
        working-directory: apps/api
        run: pnpm exec wrangler deploy

      - name: Build & deploy web (Pages)
        if: steps.guard.outputs.enabled == 'true'
        working-directory: apps/web
        run: |
          pnpm build
          pnpm exec wrangler pages deploy dist --project-name school-directory
